<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcc00">

  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <title>LEGO Interface B – Blockly</title>

  <!-- Your stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Load Blockly UMD (global Blockly object)  -->
  <script src="https://unpkg.com/blockly@12.4.1/blockly.min.js"></script>

  <!-- CANCEL Loading MQTT.js for now since it requires WSS secure connection
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  -->

</head>

<body>
  <header id="top-bar">
    <button id="connectBtnLegoB">Connect LEGO Interface B</button>
    <button id="connectBtnRcx">Connect LEGO RCX</button>
    <button id="disconnectBtn">Disconnect All</button>
    <button id="saveBtn">Save Project</button>
    <button id="loadBtn">Load Project</button>
    <button id="clearWorkspaceBtn">Clear</button>
    <button id="runBtn">Run</button>
    <button id="stopBtn">Stop</button>
    <div id="debugToggle">
      <label for="debugPackets">Debug Int.B: Log Device Packets</label>
      <input type="checkbox" id="debugPackets">
    </div>
    <!-- Hidden file input for loading XML -->
    <input type="file" id="fileInput" accept=".json,application/json" style="display:none" />
  </header>

  <main id="main-layout">
    <div id="blockly-container">
      <div id="blocklyDiv"></div>
    </div>

    <aside id="right-panel">
      <h2>Devices</h2>
      <div id="devicesList"></div>

      <div id="statusHeader">
        <h2>Status</h2>
        <button id="clearStatusBtn" class="statusClearBtn">Clear</button>
      </div>

      <pre id="statusLog"></pre>
    </aside>

  </main>

  <footer id="lego-footer">
    <div class="footer-left">
      LEGO® is a trademark of the LEGO Group of companies which does not sponsor, authorize or endorse this site.
    </div>

    <div class="footer-right">
      <a id="source-link" href="https://github.com/BlissCA/lego-blockly" target="_blank">
        Source Code
      </a>
      <span id="version-label"></span>
    </div>
  </footer>
  
  <script src="./version.js"></script>

  <!-- Your ES‑module application -->
  <script type="module" src="./main.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");

      // Reload the page automatically when a new service worker activates
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });
    }
  </script>
  
</body>
</html>
