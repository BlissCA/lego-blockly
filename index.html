<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <meta name="usb" content="0x0694:0x0003">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcc00">

  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <title>LEGO Interface B – Blockly</title>

  <!-- Your stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Load Blockly UMD (global Blockly object)  -->
  <script src="https://unpkg.com/blockly@12.4.1/blockly.min.js"></script>

  <!-- CANCEL Loading MQTT.js for now since it requires WSS secure connection
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  -->

</head>

<body>
  <header id="top-bar">
    <div id="deviceConnectBar">
      <select id="deviceSelect">
        <option value="A">Interface A</option>
        <option value="A_V2">Interface A V2</option>
        <option value="B">Interface B</option>
        <option value="RCX">RCX</option>
        <option value="CM">CyberMaster</option>
        <option value="WD1">WeDo 1.0</option>
        <option value="VLLSER">VLL Serial</option>
      </select>
      <button id="connectDeviceBtn">Connect</button>
    </div>
<!--
    <button id="connectBtnLegoA">Connect Int.A</button>
    <button id="connectBtnLegoB">Connect Int.B</button>
    <button id="connectBtnRcx">Connect RCX</button>
    <div id="CyberMasterToggle">
      <label for="useCyberMaster">CM</label>
      <input type="checkbox" id="useCyberMaster">
    </div>
-->
    <button id="disconnectBtn">Disconnect All</button>

    <!-- New Save / Project Name / Save As / Load layout -->
    <button id="saveBtn">Save</button>

    <input
      id="projectNameField"
      type="text"
      value="lego-project"
      readonly
      style="width: 160px; margin: 0 6px; text-align: center;"
    />

    <button id="saveAsBtn">Save As</button>
    <button id="loadBtn">Load Project</button>

    <button id="newProjectBtn">New</button>
    <button id="runBtn">Run</button>
    <button id="stopBtn">Stop</button>

    <div id="highlightExecutionToggle">
      <label for="highlightToggle">Highlight Execution</label>
      <input type="checkbox" id="highlightToggle">
    </div>

    <div id="debugToggle">
      <label for="debugPackets">Log Int.B Read Packets</label>
      <input type="checkbox" id="debugPackets">
    </div>

    <!-- Hidden file input for loading XML (kept for backward compatibility) -->
    <input type="file" id="fileInput" accept=".json,application/json" style="display:none" />
  </header>

  <!-- Non-blocking dialogs -->

  <!-- Generic confirmation dialog -->
  <dialog id="confirmDialog">
    <form method="dialog" class="dialog-content">
      <p id="confirmDialogMessage"></p>
      <div class="dialog-buttons">
        <button value="cancel">Cancel</button>
        <button value="ok" class="primary">OK</button>
      </div>
    </form>
  </dialog>

  <!-- New variable dialog -->
  <dialog id="variableDialog">
    <form method="dialog" class="dialog-content">
      <label for="variableNameInput">New variable name:</label>
      <input id="variableNameInput" type="text" autocomplete="off">
      <div class="dialog-buttons">
        <button value="cancel">Cancel</button>
        <button value="ok" class="primary">OK</button>
      </div>
    </form>
  </dialog>


  <!-- Your Blockly container, etc. -->
 
  <main id="main-layout">
    <div id="blockly-container">
      <div id="blocklyDiv"></div>
    </div>

    <aside id="right-panel">
      <h2>Devices</h2>
      <div id="devicesList"></div>

      <div id="statusHeader">
        <h2>Status</h2>
        <button id="clearStatusBtn" class="statusClearBtn">Clear</button>
      </div>

      <pre id="statusLog"></pre>
    </aside>

  </main>

  <footer id="lego-footer">
    <div class="footer-left">
      LEGO® is a trademark of the LEGO Group of companies which does not sponsor, authorize or endorse this site.
    </div>

    <div class="footer-right">
      <a id="source-link" href="https://github.com/BlissCA/lego-blockly" target="_blank">
        Source Code
      </a>
      <span id="version-label"></span>
    </div>
  </footer>
  
  <script src="./version.js"></script>

  <!-- Your ES‑module application -->
  <script type="module" src="./main.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");

      // Reload the page automatically when a new service worker activates
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });
    }
  </script>
  
</body>
</html>
