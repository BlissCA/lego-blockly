<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcc00">

  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <title>LEGO Interface B – Blockly</title>

  <!-- Your stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Load Blockly UMD (global Blockly object)  -->
  <script src="https://unpkg.com/blockly@12.4.1/blockly.min.js"></script>

  <!-- CANCEL Loading MQTT.js for now since it requires WSS secure connection
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  -->

</head>

<body>
  <header id="top-bar">
    <button id="connectBtnLegoB">Connect LEGO Interface B</button>
    <button id="connectBtnRcx">Connect LEGO RCX</button>
    <button id="disconnectBtn">Disconnect All</button>
    <button id="saveBtn">Save Project</button>
    <button id="loadBtn">Load Project</button>
    <button id="clearWorkspaceBtn">Clear</button>
    <button id="runBtn">Run</button>
    <button id="stopBtn">Stop</button>
    <div id="debugToggle">
      <label for="debugPackets">Debug: Log Device Packets</label>
      <input type="checkbox" id="debugPackets">
    </div>
    <!-- Hidden file input for loading XML -->
    <input type="file" id="fileInput" accept=".json,application/json" style="display:none" />
  </header>

  <main id="main-layout">
    <div id="blockly-container">
      <div id="blocklyDiv"></div>
    </div>

    <aside id="right-panel">
      <h2>Devices</h2>
      <div id="devicesList"></div>

      <div id="statusHeader">
        <h2>Status</h2>
        <button id="clearStatusBtn" class="statusClearBtn">Clear</button>
      </div>

      <pre id="statusLog"></pre>
    </aside>

  </main>

  <!-- Your ES‑module application -->
  <script type="module" src="./main.js"></script>

  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js").then(reg => {

      function showUpdateBanner(worker) {
        const banner = document.getElementById("update-banner");
        banner.style.display = "flex";

        document.getElementById("update-button").onclick = () => {
          worker.postMessage({ action: "skipWaiting" });
        };
      }

      // Detect new service worker
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;

        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            showUpdateBanner(newWorker);
          }
        });
      });

      // When the new SW activates, reload the page
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });

    });
  }
  </script>
  
  <div id="update-banner">
    <span>A new version is available.</span>
    <button id="update-button">Update</button>
  </div>
</body>
</html>
