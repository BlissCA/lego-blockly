<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LEGO Interface B – Blockly</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="top-bar">
    <button id="connectBtn">Connect LEGO Interface B</button>
    <button id="disconnectBtn">Disconnect All</button>
    <button id="saveBtn">Save Project</button>
    <button id="loadBtn">Load Project</button>
    <button id="runBtn">Run</button>
    <input type="file" id="fileInput" accept=".xml" style="display:none" />
  </header>

  <main id="main-layout">
    <div id="blockly-container">
      <div id="blocklyDiv"></div>
    </div>
    <aside id="right-panel">
      <h2>Devices</h2>
      <div id="devicesList"></div>

      <h2>Status</h2>
      <pre id="statusLog"></pre>
    </aside>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
